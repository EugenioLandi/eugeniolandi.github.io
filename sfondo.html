<!-- Wave Interference Background — paste into your <head> -->
<!-- Parameters match the original interactive generator exactly -->
<script>
(function () {

  // ── Parameters ─────────────────────────────────────────────────────────
  var SOURCES    = 5;
  var FREQ       = 14;        // same scale as the slider (5–30)
  var CONTOURS   = 18;
  var STEP       = 6;
  var COLOR      = '#4a3a6a';
  var BACKGROUND = '#f5f3ef';
  // ───────────────────────────────────────────────────────────────────────

  var W = window.innerWidth  || 1200;
  var H = window.innerHeight || 900;

  // Seeded RNG — fresh seed each page load
  var seed = Math.floor(Math.random() * 0xffffff);
  function rng() {
    seed = (seed * 1664525 + 1013904223) & 0xffffffff;
    return (seed >>> 0) / 0xffffffff;
  }

  function hex2rgb(hex) {
    return [
      parseInt(hex.slice(1,3), 16),
      parseInt(hex.slice(3,5), 16),
      parseInt(hex.slice(5,7), 16)
    ];
  }

  var rgb = hex2rgb(COLOR);
  var R = rgb[0], G = rgb[1], B = rgb[2];

  // Exactly as in the original: f = freq / 100
  var f = parseFloat(FREQ) / 100;

  var srcs = [];
  for (var i = 0; i < SOURCES; i++) {
    srcs.push([rng() * W, rng() * H]);
  }

  function val(x, y) {
    var v = 0;
    for (var s = 0; s < srcs.length; s++) {
      var dx = x - srcs[s][0], dy = y - srcs[s][1];
      var d = Math.sqrt(dx*dx + dy*dy);
      v += Math.sin(d * f * Math.PI * 2 / Math.min(W, H) * 8);
    }
    return v / srcs.length;
  }

  var cols = Math.ceil(W / STEP) + 1;
  var rows = Math.ceil(H / STEP) + 1;

  var lines = [];

  for (var ci = 0; ci < CONTOURS; ci++) {
    var t = -1 + ci * (2 / (CONTOURS - 1));

    for (var row = 0; row < rows - 1; row++) {
      for (var col = 0; col < cols - 1; col++) {
        var x = col * STEP, y = row * STEP;
        var v00 = val(x,        y);
        var v10 = val(x + STEP, y);
        var v01 = val(x,        y + STEP);
        var v11 = val(x + STEP, y + STEP);

        function lerp(a, b, va, vb, tv) {
          return a + (b - a) * ((tv - va) / (vb - va));
        }

        var pts = [];
        if ((v00 < t) !== (v10 < t)) pts.push([lerp(x, x+STEP, v00, v10, t), y]);
        if ((v10 < t) !== (v11 < t)) pts.push([x+STEP, lerp(y, y+STEP, v10, v11, t)]);
        if ((v01 < t) !== (v11 < t)) pts.push([lerp(x, x+STEP, v01, v11, t), y+STEP]);
        if ((v00 < t) !== (v01 < t)) pts.push([x, lerp(y, y+STEP, v00, v01, t)]);

        if (pts.length === 2) {
          var alpha = (0.06 + (1 - Math.abs(t)) * 0.09).toFixed(3);
          lines.push(
            '<line x1="' + pts[0][0].toFixed(1) + '" y1="' + pts[0][1].toFixed(1) +
            '" x2="'     + pts[1][0].toFixed(1) + '" y2="' + pts[1][1].toFixed(1) +
            '" stroke="rgba(' + R + ',' + G + ',' + B + ',' + alpha + ')"' +
            ' stroke-width="0.8"/>'
          );
        }
      }
    }
  }

  var dots = [];
  for (var s = 0; s < srcs.length; s++) {
    dots.push(
      '<circle cx="' + srcs[s][0].toFixed(1) + '" cy="' + srcs[s][1].toFixed(1) +
      '" r="2.5" fill="rgba(' + R + ',' + G + ',' + B + ',0.3)"/>'
    );
  }

  var svgStr =
    '<svg xmlns="http://www.w3.org/2000/svg" width="' + W + '" height="' + H + '">' +
    '<rect width="' + W + '" height="' + H + '" fill="' + BACKGROUND + '"/>' +
    lines.join('') +
    dots.join('') +
    '</svg>';

  var encoded = 'data:image/svg+xml;charset=utf-8,' + encodeURIComponent(svgStr);

  var style = document.createElement('style');
  style.textContent =
    'html, body { margin: 0; min-height: 100%; }\n' +
    'body {\n' +
    '  background-image: url("' + encoded + '");\n' +
    '  background-size: cover;\n' +
    '  background-attachment: fixed;\n' +
    '  background-repeat: no-repeat;\n' +
    '}';
  document.head.appendChild(style);

})();
</script>
